name: Locust Load Test

# Menjalankan workflow ini secara manual dari tab 'Actions' di GitHub
on:
  workflow_dispatch:
    inputs:
      users:
        description: 'Number of users (peak concurrency)'
        required: true
        default: '50'
      spawn_rate:
        description: 'Spawn rate (users per second)'
        required: true
        default: '10'
      run_time:
        description: 'Run time (e.g., 30s, 1m, 5m)'
        required: true
        default: '1m'
  push:
      branches: [main, master]
  pull_request:
      branches: [main, master]

jobs:
  run-locust:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install locust

      # Menjalankan Locust secara headless (tanpa Web UI)
      - name: Run Locust Load Test
        run: |
          locust -f ep1.py \
            --headless \
            -u ${{ github.event.inputs.users }} \
            -r ${{ github.event.inputs.spawn_rate }} \
            --run-time ${{ github.event.inputs.run_time }} \
            --html locust-report.html

      # (Opsional) Mengunggah hasil report berbentuk HTML agar bisa di-download
      - name: Upload Locust Report
        uses: actions/upload-artifact@v4
        if: always() # Tetap upload meskipun load test ada yang error
        with:
          name: locust-report
          path: locust-report.html